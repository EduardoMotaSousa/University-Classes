<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>University Classes</title>

  <link rel="icon" href="Front/icon.png">
  <link rel="stylesheet" href="Front/style.css">
</head>
<body>

  <!-- HERO -->
  <header class="hero">
    <h1>University <span>Classes</span></h1>
    <p>Projeto pessoal para organização e visualização dos meus estudos em C++, com integração dinâmica ao GitHub.</p>
  </header>

  <!-- GRAFICO GITHUB -->
  <section class="contrib">
    <h2>📊 Commits</h2>
    <img 
      src="https://ghchart.rshah.org/40c463/EduardoMotaSousa" 
      alt="GitHub chart"
    />
  </section>

  <!-- NAVEGAÇÃO -->
  <section class="nav" id="pastas"></section>

  <!-- INFO -->
  <section class="info">

    <div id="homeBtn" class="home-btn" onclick="voltar()" style="display:none;">
     <div class="home-content">
       <span class="home-icon">📁</span>
       <span class="home-text">Home Page</span>
      </div>
      <div class="home-arrow">⬅</div>
    </div>

    <h2 id="caminho"></h2>

  </section>

  <!-- README -->
  <section class="readme">
    <h2>📘 Sobre o Projeto</h2>

    <div id="readme-content">
      Carregando README...
    </div>
  </section>

  <!-- BOTÕES -->
  <section class="github">
    <button onclick="irGithub()" class="btn-github">
      🚀 GitHub
    </button>

    <button onclick="irLinkedin()" class="btn-linkedin">
      💼 LinkedIn
    </button>
  </section>

  <!-- LIB MARKDOWN -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script src="Front/script.js"></script>

</body>
</html>
