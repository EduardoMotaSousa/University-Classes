<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>University Classes</title>

  <!-- CSS -->
  <link rel="stylesheet" href="Front/style.css">

  <!-- ÍCONES -->
  <link rel="icon" href="Front/icon.png">
  <link rel="apple-touch-icon" href="Front/icon.png">

  <!-- OPEN GRAPH -->
  <meta property="og:title" content="University Classes">
  <meta property="og:description" content="Projeto para organizar e visualizar meus estudos em C++ com integração ao GitHub.">
  <meta property="og:image" content="https://eduardomotasousa.github.io/University-Classes/Front/icon.png">
  <meta property="og:url" content="https://eduardomotasousa.github.io/University-Classes/">
  <meta property="og:type" content="website">
</head>

<body>

  <!-- HERO -->
  <header class="hero">
    <h1>University <span>Classes</span></h1>

    <p>
      Projeto pessoal para organização e visualização dos meus estudos em C++,
      utilizando GitHub API, HTML, CSS e JavaScript.
    </p>
  </header>

  <!-- COMMITS -->
  <section class="contrib">
    <h2>📊 Meus Commits</h2>

    <img
      src="https://ghchart.rshah.org/40c463/EduardoMotaSousa"
      alt="GitHub Chart"
    >
  </section>

  <!-- NAVEGAÇÃO -->
  <section class="nav" id="pastas"></section>

  <!-- INFO -->
  <section class="info">

    <div
      id="homeBtn"
      class="home-btn"
      onclick="voltar()"
      style="display:none;"
    >
      <div class="home-top">
        <span>📁</span>
        <span>Home Page</span>
      </div>

      <div class="home-arrow">
        ⬅
      </div>
    </div>

    <h2 id="caminho"></h2>

  </section>

  <!-- README -->
  <section class="readme">

    <h2>📘 Sobre o Projeto</h2>

    <div id="readme-content">
      Carregando README...
    </div>

  </section>

  <!-- BOTÕES -->
  <section class="github">

    <button onclick="irGithub()" class="btn-github">
      🚀 GitHub
    </button>

    <button onclick="irLinkedin()" class="btn-linkedin">
      💼 LinkedIn
    </button>

  </section>

  <!-- MARKDOWN -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- JS -->
  <script src="Front/script.js"></script>

</body>
</html>
