name: Atualizar Dados

on:
  push:
  workflow_dispatch:

jobs:
  gerar-json:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0 # Baixa o histórico completo da branch atual

      - name: Baixar árvore
        run: |
          curl \
          -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
          https://api.github.com/repos/EduardoMotaSousa/University-Classes/git/trees/main?recursive=1 \
          > dados.json

      - name: Gerar commits dos últimos 365 dias (Via Git Local - Todas as Branches)
        run: |
          # Sincroniza todas as branches remotas para o runner conhecê-las
          git fetch --all --quiet

          python3 -c "
          import subprocess
          import json
          from datetime import datetime, timedelta

          # Calcula a data de 365 dias atrás
          since_date = (datetime.now() - timedelta(days=365)).strftime('%Y-%m-%d')

          # '--all' faz o git log varrer todas as branches existentes local e remotamente
          result = subprocess.run(
              ['git', 'log', '--all', f'--since={since_date}', 
              '--pretty=format:%H|%aI|%ae',  # adiciona email do autor
              '--invert-grep', '--grep=Atualizar JSON'],  # exclui commits do Actions
              capture_output=True,
              text=True,
              check=True
          )

          commits = []
          seen_shas = set() # Evita duplicar commits que estejam presentes em mais de uma branch
          
          if result.stdout.strip():
            for line in result.stdout.strip().split('\n'):
                if '|' in line:
                    parts = line.split('|', 2)
                    sha, date = parts[0], parts[1]
                    if sha not in seen_shas:
                        seen_shas.add(sha)
                        commits.append({
                            'sha': sha,
                            'date': date
                        })

          # Salva tudo bonitinho no formato esperado
          with open('commits.json', 'w') as f:
              json.dump({'commits': commits}, f)
          "

      - name: Commit JSONs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add dados.json commits.json

          # Comita as alterações apenas se houver mudanças reais para evitar loops infinitos
          git diff --quiet && git diff --staged --quiet || (git commit -m "Atualizar JSON [skip ci]" && git push)