name: Atualizar Dados

on:
  push:
  workflow_dispatch:

jobs:

  gerar-json:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Baixar árvore

        run: |
          curl \
          -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
          https://api.github.com/repos/EduardoMotaSousa/University-Classes/git/trees/main?recursive=1 \
          > dados.json

      - name: Baixar commits dos últimos 90 dias

        run: |
          # Data de 90 dias atrás em formato ISO 8601
          SINCE=$(date -u -d '90 days ago' '+%Y-%m-%dT%H:%M:%SZ')

          # Busca até 3 páginas de commits (300 commits no total)
          PAGE1=$(curl -s \
            -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            "https://api.github.com/repos/EduardoMotaSousa/University-Classes/commits?per_page=100&page=1&since=${SINCE}")

          PAGE2=$(curl -s \
            -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            "https://api.github.com/repos/EduardoMotaSousa/University-Classes/commits?per_page=100&page=2&since=${SINCE}")

          PAGE3=$(curl -s \
            -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            "https://api.github.com/repos/EduardoMotaSousa/University-Classes/commits?per_page=100&page=3&since=${SINCE}")

          # Combina as 3 páginas num único array JSON e salva
          echo "[$PAGE1, $PAGE2, $PAGE3]" | \
          python3 -c "
          import json, sys
          pages = json.load(sys.stdin)
          commits = []
          seen = set()
          for page in pages:
            if isinstance(page, list):
              for c in page:
                sha = c.get('sha','')
                if sha and sha not in seen:
                  seen.add(sha)
                  commits.append({
                    'sha': sha,
                    'date': c['commit']['author']['date']
                  })
          print(json.dumps({'commits': commits}))
          " > commits.json

      - name: Commit JSONs

        run: |

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add dados.json commits.json

          git diff --quiet && git diff --staged --quiet || git commit -m "Atualizar JSON"

          git push