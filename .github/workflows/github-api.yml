name: Atualizar Dados

on:
  push:
  workflow_dispatch:

jobs:
  gerar-json:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0 # Garante que todo o histórico de commits seja baixado localmente

      - name: Baixar árvore
        run: |
          curl \
          -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
          https://api.github.com/repos/EduardoMotaSousa/University-Classes/git/trees/main?recursive=1 \
          > dados.json

      - name: Gerar commits dos últimos 365 dias (Via Git Local)
        run: |
          python3 -c "
          import subprocess
          import json
          from datetime import datetime, timedelta

          # Calcula a data de 365 dias atrás
          since_date = (datetime.now() - timedelta(days=365)).strftime('%Y-%m-%d')

          # Executa o git log local filtrando pela data
          # %H = Hash do commit (SHA)
          # %aI = Data do autor em formato estrito ISO 8601 (igual ao padrão da API)
          result = subprocess.run(
              ['git', 'log', f'--since={since_date}', '--pretty=format:%H|%aI'],
              capture_output=True,
              text=True,
              check=True
          )

          commits = []
          if result.stdout.strip():
              for line in result.stdout.strip().split('\n'):
                  if '|' in line:
                      sha, date = line.split('|', 1)
                      commits.append({
                          'sha': sha,
                          'date': date
                      })

          # Guarda o resultado estruturado no commits.json
          with open('commits.json', 'w') as f:
              json.dump({'commits': commits}, f)
          "

      - name: Commit JSONs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add dados.json commits.json

          # Evita erro caso não haja mudanças nos arquivos e previne loop infinito de commits usando [skip ci]
          git diff --quiet && git diff --staged --quiet || (git commit -m "Atualizar JSON [skip ci]" && git push)